<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/>
    </marker>
  </defs>

  <rect width="980" height="420" fill="#f9fafb"/>
  <text x="40" y="46" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2937">
    Async MQ Architecture (Kafka / RabbitMQ)
  </text>

  <rect x="40" y="90" width="180" height="74" rx="10" ry="10" fill="#dbeafe" stroke="#4b5563" stroke-width="2"/>
  <text x="130" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#111827">Client</text>
  <text x="130" y="144" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">HTTP Request</text>

  <rect x="280" y="90" width="220" height="74" rx="10" ry="10" fill="#dcfce7" stroke="#4b5563" stroke-width="2"/>
  <text x="390" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#111827">Business API</text>
  <text x="390" y="144" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">Publish Task</text>

  <rect x="560" y="90" width="200" height="74" rx="10" ry="10" fill="#fee2e2" stroke="#4b5563" stroke-width="2"/>
  <text x="660" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#111827">MQ Broker</text>
  <text x="660" y="144" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">Kafka / RabbitMQ</text>

  <rect x="560" y="250" width="200" height="74" rx="10" ry="10" fill="#ede9fe" stroke="#4b5563" stroke-width="2"/>
  <text x="660" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#111827">Consumer</text>
  <text x="660" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">Run Compute Task</text>

  <rect x="820" y="250" width="130" height="74" rx="10" ry="10" fill="#fef3c7" stroke="#4b5563" stroke-width="2"/>
  <text x="885" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#111827">Storage</text>
  <text x="885" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">DB / Cache</text>

  <path d="M220 127 L280 127" fill="none" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="250" y="117" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">Submit</text>

  <path d="M500 127 L560 127" fill="none" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="530" y="117" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">Enqueue</text>

  <path d="M660 164 L660 250" fill="none" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="676" y="212" font-family="Arial, sans-serif" font-size="14" fill="#374151">Consume</text>

  <path d="M760 287 L820 287" fill="none" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="790" y="277" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">Persist</text>

  <path d="M820 324 C760 380, 480 388, 220 164" fill="none" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="500" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">
    Query Result and Return (Polling / Callback / WebSocket)
  </text>
</svg>
