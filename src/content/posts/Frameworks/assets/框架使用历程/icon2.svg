<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1000" width="100%" height="100%" style="background-color: #f4f6f9; font-family: 'Segoe UI', 'Microsoft YaHei', -apple-system, sans-serif;">
    <defs>
        <!-- 阴影滤镜 -->
        <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
            <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.1"/>
        </filter>
        <filter id="light-shadow" x="-5%" y="-5%" width="110%" height="110%">
            <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.06"/>
        </filter>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="6" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>

        <!-- 渐变色 -->
        <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#e9ecef"/>
        </linearGradient>
        <linearGradient id="header-grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#2c3e50"/>
            <stop offset="100%" stop-color="#3498db"/>
        </linearGradient>
        <linearGradient id="cpp-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#e34c26"/>
            <stop offset="100%" stop-color="#f0652f"/>
        </linearGradient>
        <linearGradient id="python-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3776ab"/>
            <stop offset="100%" stop-color="#5a9fd4"/>
        </linearGradient>
        <linearGradient id="rust-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ce422b"/>
            <stop offset="100%" stop-color="#e05d4a"/>
        </linearGradient>
        <linearGradient id="tauri-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#24c8db"/>
            <stop offset="100%" stop-color="#6af2ff"/>
        </linearGradient>
        
        <!-- 箭头标记 -->
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#7f8c8d"/>
        </marker>
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#3498db"/>
        </marker>
    </defs>

    <!-- 全局背景 -->
    <rect width="1200" height="1000" fill="url(#bg-grad)"/>

    <!-- 顶部导航栏 -->
    <rect x="0" y="0" width="1200" height="70" fill="url(#header-grad)" filter="url(#shadow)"/>
    <text x="600" y="45" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="3">底层 AI 基础设施与兴趣开发全景技术栈规划（2026）</text>

    <!-- ================= 第 1 层：核心生存技能（必须掌握） ================= -->
    <rect x="50" y="100" width="1100" height="160" rx="15" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="50" y="100" width="1100" height="40" rx="15" fill="#e74c3c"/>
    <rect x="50" y="125" width="1100" height="15" fill="#e74c3c"/>
    <text x="600" y="128" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="1">核心生存技能（必须掌握）</text>

    <!-- C++ -->
    <rect x="80" y="160" width="320" height="80" rx="10" fill="#fff5f0" stroke="#e34c26" stroke-width="2" filter="url(#light-shadow)"/>
    <text x="100" y="190" font-size="24" font-weight="bold" fill="#e34c26">C++ (C++17/20)</text>
    <text x="100" y="215" font-size="14" fill="#555">AI框架核心 / 算子库 / 推理引擎</text>
    <text x="100" y="232" font-size="12" fill="#888">必须精通（80%精力）</text>

    <!-- Python -->
    <rect x="440" y="160" width="320" height="80" rx="10" fill="#f0f6ff" stroke="#3776ab" stroke-width="2" filter="url(#light-shadow)"/>
    <text x="460" y="190" font-size="24" font-weight="bold" fill="#3776ab">Python</text>
    <text x="460" y="215" font-size="14" fill="#555">胶水语言 / 快速原型 / 与框架交互</text>
    <text x="460" y="232" font-size="12" fill="#888">必须熟练（50%精力）</text>

    <!-- CMake -->
    <rect x="800" y="160" width="320" height="80" rx="10" fill="#ecf5fb" stroke="#064f8c" stroke-width="2" filter="url(#light-shadow)"/>
    <text x="820" y="190" font-size="24" font-weight="bold" fill="#064f8c">CMake</text>
    <text x="820" y="215" font-size="14" fill="#555">C++项目构建 / 依赖管理</text>
    <text x="820" y="232" font-size="12" fill="#888">必须掌握基础</text>


    <!-- ================= 第 2 层：强力辅助（强烈建议） ================= -->
    <rect x="50" y="290" width="1100" height="160" rx="15" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="50" y="290" width="1100" height="40" rx="15" fill="#f39c12"/>
    <rect x="50" y="315" width="1100" height="15" fill="#f39c12"/>
    <text x="600" y="318" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="1">强力辅助（强烈建议）</text>

    <!-- CUDA -->
    <rect x="80" y="350" width="240" height="80" rx="10" fill="#f2f9f0" stroke="#76b900" stroke-width="2" filter="url(#light-shadow)"/>
    <text x="100" y="380" font-size="22" font-weight="bold" fill="#76b900">CUDA / HIP</text>
    <text x="100" y="405" font-size="14" fill="#555">GPU编程 / 算子开发</text>
    <text x="100" y="422" font-size="12" fill="#888">强烈建议（30%精力）</text>

    <!-- Rust -->
    <rect x="360" y="350" width="240" height="80" rx="10" fill="#fff5f0" stroke="#ce422b" stroke-width="2" filter="url(#light-shadow)"/>
    <text x="380" y="380" font-size="22" font-weight="bold" fill="#ce422b">Rust</text>
    <text x="380" y="405" font-size="14" fill="#555">安全组件 / CLI / Web后端</text>
    <text x="380" y="422" font-size="12" fill="#888">强力辅助（40%精力）</text>

    <!-- Tauri -->
    <rect x="640" y="350" width="240" height="80" rx="10" fill="#eefafc" stroke="#24c8db" stroke-width="2" filter="url(#light-shadow)"/>
    <text x="660" y="380" font-size="22" font-weight="bold" fill="#24c8db">Tauri 2.0</text>
    <text x="660" y="405" font-size="14" fill="#555">跨平台GUI / 桌面+移动端</text>
    <text x="660" y="422" font-size="12" fill="#888">Rust后端 + Web前端</text>

    <!-- Git -->
    <rect x="920" y="350" width="200" height="80" rx="10" fill="#f9f2f0" stroke="#f05032" stroke-width="2" filter="url(#light-shadow)"/>
    <text x="940" y="380" font-size="22" font-weight="bold" fill="#f05032">Git</text>
    <text x="940" y="405" font-size="14" fill="#555">版本控制 / CI/CD</text>
    <text x="940" y="422" font-size="12" fill="#888">熟练使用</text>


    <!-- ================= 第 3 层：按需学习（特定场景有用） ================= -->
    <rect x="50" y="480" width="1100" height="130" rx="15" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="50" y="480" width="1100" height="40" rx="15" fill="#3498db"/>
    <rect x="50" y="505" width="1100" height="15" fill="#3498db"/>
    <text x="600" y="508" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="1">按需学习（特定场景有用）</text>

    <!-- 按需学习区块 -->
    <rect x="80" y="540" width="190" height="50" rx="8" fill="#f8f9fa" stroke="#ccd1d9" stroke-width="1"/>
    <text x="175" y="570" font-size="16" font-weight="bold" fill="#2c3e50" text-anchor="middle">Docker（环境封装）</text>

    <rect x="290" y="540" width="190" height="50" rx="8" fill="#f8f9fa" stroke="#ccd1d9" stroke-width="1"/>
    <text x="385" y="570" font-size="16" font-weight="bold" fill="#2c3e50" text-anchor="middle">ONNX / MLIR（编译）</text>

    <rect x="500" y="540" width="190" height="50" rx="8" fill="#f8f9fa" stroke="#ccd1d9" stroke-width="1"/>
    <text x="595" y="570" font-size="16" font-weight="bold" fill="#2c3e50" text-anchor="middle">OpenMP / TBB（并行）</text>

    <rect x="710" y="540" width="190" height="50" rx="8" fill="#f8f9fa" stroke="#ccd1d9" stroke-width="1"/>
    <text x="805" y="570" font-size="16" font-weight="bold" fill="#2c3e50" text-anchor="middle">Linux 系统编程</text>

    <rect x="920" y="540" width="200" height="50" rx="8" fill="#f8f9fa" stroke="#ccd1d9" stroke-width="1"/>
    <text x="1020" y="570" font-size="16" font-weight="bold" fill="#2c3e50" text-anchor="middle">SQLite（嵌入式存储）</text>


    <!-- ================= 第 4 层：明确不需要投入（忽略） ================= -->
    <rect x="50" y="640" width="1100" height="120" rx="15" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="50" y="640" width="1100" height="40" rx="15" fill="#95a5a6"/>
    <rect x="50" y="665" width="1100" height="15" fill="#95a5a6"/>
    <text x="600" y="668" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="1">明确不需要投入（忽略）</text>

    <rect x="80" y="700" width="190" height="40" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4"/>
    <text x="175" y="725" font-size="16" font-weight="bold" fill="#7f8c8d" text-anchor="middle">Java / JVM 生态</text>

    <rect x="290" y="700" width="190" height="40" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4"/>
    <text x="385" y="725" font-size="16" font-weight="bold" fill="#7f8c8d" text-anchor="middle">C# / .NET</text>

    <rect x="500" y="700" width="190" height="40" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4"/>
    <text x="595" y="725" font-size="16" font-weight="bold" fill="#7f8c8d" text-anchor="middle">Dart / Flutter</text>

    <rect x="710" y="700" width="190" height="40" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4"/>
    <text x="805" y="725" font-size="16" font-weight="bold" fill="#7f8c8d" text-anchor="middle">Node.js / 全栈JS</text>

    <rect x="920" y="700" width="200" height="40" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4"/>
    <text x="1020" y="725" font-size="16" font-weight="bold" fill="#7f8c8d" text-anchor="middle">Qt / QML</text>


    <!-- ================= 第 5 层：技术栈融合与协同（底部） ================= -->
    <rect x="50" y="790" width="1100" height="170" rx="15" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="50" y="790" width="1100" height="40" rx="15" fill="#2c3e50"/>
    <rect x="50" y="815" width="1100" height="15" fill="#2c3e50"/>
    <text x="600" y="818" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="1">技术栈融合与协同生态（1+1 > 2）</text>

    <!-- 协同关系 -->
    <!-- C++ <-> Python -->
    <rect x="80" y="850" width="230" height="50" rx="8" fill="#ebf5ff" stroke="#3776ab" stroke-width="1"/>
    <text x="195" y="872" font-size="16" font-weight="bold" fill="#2c3e50" text-anchor="middle">C++ ↔ Python</text>
    <text x="195" y="892" font-size="13" fill="#555" text-anchor="middle">Pybind11 · Nanobind</text>

    <!-- C++ <-> Rust -->
    <rect x="340" y="850" width="230" height="50" rx="8" fill="#fff0ec" stroke="#ce422b" stroke-width="1"/>
    <text x="455" y="872" font-size="16" font-weight="bold" fill="#2c3e50" text-anchor="middle">C++ ↔ Rust</text>
    <text x="455" y="892" font-size="13" fill="#555" text-anchor="middle">cxx · bindgen · FFI</text>

    <!-- Python <-> Rust -->
    <rect x="600" y="850" width="230" height="50" rx="8" fill="#edf7ea" stroke="#76b900" stroke-width="1"/>
    <text x="715" y="872" font-size="16" font-weight="bold" fill="#2c3e50" text-anchor="middle">Python ↔ Rust</text>
    <text x="715" y="892" font-size="13" fill="#555" text-anchor="middle">PyO3 · Maturin</text>

    <!-- 全平台桥梁 -->
    <rect x="860" y="850" width="260" height="50" rx="8" fill="#eefafc" stroke="#24c8db" stroke-width="2"/>
    <text x="990" y="872" font-size="16" font-weight="bold" fill="#e67e22" text-anchor="middle">全平台应用桥梁：Tauri</text>
    <text x="990" y="892" font-size="13" fill="#555" text-anchor="middle">前端Web技术 + 后端Rust</text>

    <!-- 底部总结 -->
    <rect x="250" y="930" width="700" height="40" rx="20" fill="url(#header-grad)" filter="url(#shadow)"/>
    <text x="600" y="955" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="2">C++ / Python 保饭碗 · Rust / Tauri 找乐子 · CUDA 看方向 · 其他全忽略</text>

    <!-- 连接线 -->
    <path d="M 600 260 L 600 280" stroke="#7f8c8d" stroke-width="2" stroke-dasharray="5" marker-end="url(#arrow)"/>
    <path d="M 600 450 L 600 470" stroke="#7f8c8d" stroke-width="2" stroke-dasharray="5" marker-end="url(#arrow)"/>
    <path d="M 600 610 L 600 630" stroke="#7f8c8d" stroke-width="2" stroke-dasharray="5" marker-end="url(#arrow)"/>
    <path d="M 600 760 L 600 780" stroke="#7f8c8d" stroke-width="2" stroke-dasharray="5" marker-end="url(#arrow)"/>

</svg>