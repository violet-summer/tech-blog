<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="100%" height="100%" style="background-color: #f7f9fc; font-family: 'Microsoft YaHei', -apple-system, sans-serif;">
    <defs>
        <!-- 阴影滤镜 -->
        <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
            <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.08"/>
        </filter>
        <filter id="light-shadow" x="-5%" y="-5%" width="110%" height="110%">
            <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.05"/>
        </filter>

        <!-- 渐变 -->
        <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#f0f4f8"/>
        </linearGradient>
        <linearGradient id="core-grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#2c3e50"/>
            <stop offset="100%" stop-color="#3498db"/>
        </linearGradient>
        <linearGradient id="hobby-grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#e67e22"/>
            <stop offset="100%" stop-color="#e74c3c"/>
        </linearGradient>
        
        <!-- 标记箭头 -->
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#7f8c8d"/>
        </marker>
    </defs>
    
    <!-- 全局背景 -->
    <rect width="1000" height="700" fill="url(#bg-grad)"/>
    
    <!-- 顶部标题 -->
    <rect x="250" y="20" width="500" height="60" rx="10" fill="#2c3e50" filter="url(#shadow)"/>
    <text x="500" y="58" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="2">底层 AI 基础设施与兴趣开发全景技术栈</text>
    
    <!-- ================= 区域 1：核心方向（底层 AI 基础设施） ================= -->
    <rect x="40" y="110" width="560" height="350" rx="15" fill="#ffffff" filter="url(#shadow)" stroke="#e0e7ee" stroke-width="1"/>
    <!-- 区域标题栏 -->
    <rect x="40" y="110" width="560" height="45" rx="15" fill="url(#core-grad)"/>
    <rect x="40" y="140" width="560" height="15" fill="url(#core-grad)"/>
    <text x="70" y="140" font-size="20" font-weight="bold" fill="#ffffff">底层 AI 基础设施（职业核心）</text>
    
    <!-- 核心语言 -->
    <!-- C++ -->
    <rect x="70" y="180" width="220" height="80" rx="8" fill="#fff5f0" stroke="#e34c26" stroke-width="2" filter="url(#light-shadow)"/>
    <text x="85" y="215" font-size="22" font-weight="bold" fill="#e34c26">C++ (C++17/20)</text>
    <text x="85" y="240" font-size="13" fill="#555555">AI框架核心 / 算子库 / 推理引擎</text>
    <text x="85" y="255" font-size="12" fill="#888888">必须精通（80%精力）</text>
    
    <!-- Python -->
    <rect x="310" y="180" width="260" height="80" rx="8" fill="#f0f6ff" stroke="#3776ab" stroke-width="2" filter="url(#light-shadow)"/>
    <text x="325" y="215" font-size="22" font-weight="bold" fill="#3776ab">Python</text>
    <text x="325" y="240" font-size="13" fill="#555555">胶水语言 / 快速原型 / 与框架交互</text>
    <text x="325" y="255" font-size="12" fill="#888888">必须熟练（50%精力）</text>
    
    <!-- 核心工具 -->
    <!-- CUDA -->
    <rect x="70" y="280" width="220" height="80" rx="8" fill="#f2f9f0" stroke="#76b900" stroke-width="2" filter="url(#light-shadow)"/>
    <text x="85" y="315" font-size="22" font-weight="bold" fill="#76b900">CUDA / HIP</text>
    <text x="85" y="340" font-size="13" fill="#555555">GPU编程 / 算子开发 / 性能优化</text>
    <text x="85" y="355" font-size="12" fill="#888888">强烈建议（30%精力）</text>
    
    <!-- CMake -->
    <rect x="310" y="280" width="260" height="80" rx="8" fill="#ecf5fb" stroke="#064f8c" stroke-width="2" filter="url(#light-shadow)"/>
    <text x="325" y="315" font-size="22" font-weight="bold" fill="#064f8c">CMake</text>
    <text x="325" y="340" font-size="13" fill="#555555">C++项目构建 / 依赖管理 / 跨平台编译</text>
    <text x="325" y="355" font-size="12" fill="#888888">必须掌握基础</text>
    
    <!-- 核心原则 -->
    <rect x="70" y="385" width="500" height="50" rx="8" fill="#f8f9fa" stroke="#ccd1d9" stroke-width="1" stroke-dasharray="4"/>
    <text x="320" y="415" font-size="14" font-weight="bold" fill="#2c3e50" text-anchor="middle">性能基石 · 硬件直通 · 内存可控 · 生态核心</text>


    <!-- ================= 区域 2：兴趣开发（全平台工具链） ================= -->
    <rect x="630" y="110" width="330" height="350" rx="15" fill="#ffffff" filter="url(#shadow)" stroke="#e0e7ee" stroke-width="1"/>
    <!-- 区域标题栏 -->
    <rect x="630" y="110" width="330" height="45" rx="15" fill="url(#hobby-grad)"/>
    <rect x="630" y="140" width="330" height="15" fill="url(#hobby-grad)"/>
    <text x="660" y="140" font-size="20" font-weight="bold" fill="#ffffff">兴趣开发与全平台工具</text>
    
    <!-- Rust -->
    <rect x="660" y="180" width="270" height="80" rx="8" fill="#fff5f0" stroke="#ce422b" stroke-width="2" filter="url(#light-shadow)"/>
    <text x="675" y="215" font-size="22" font-weight="bold" fill="#ce422b">Rust</text>
    <text x="675" y="240" font-size="13" fill="#555555">安全组件 / CLI工具 / Web后端</text>
    <text x="675" y="255" font-size="12" fill="#888888">强力辅助（40%精力）</text>
    
    <!-- Tauri -->
    <rect x="660" y="280" width="270" height="80" rx="8" fill="#eefafc" stroke="#24c8db" stroke-width="2" filter="url(#light-shadow)"/>
    <text x="675" y="315" font-size="22" font-weight="bold" fill="#24c8db">Tauri 2.0</text>
    <text x="675" y="340" font-size="13" fill="#555555">跨平台GUI / 桌面+移动端</text>
    <text x="675" y="355" font-size="12" fill="#888888">Rust后端 + Web前端</text>
    
    <!-- Axum (Web后端) -->
    <rect x="660" y="380" width="270" height="60" rx="8" fill="#f3f0ff" stroke="#6c5ce7" stroke-width="2" filter="url(#light-shadow)"/>
    <text x="675" y="410" font-size="20" font-weight="bold" fill="#6c5ce7">Axum · Actix · Rocket</text>
    <text x="675" y="430" font-size="12" fill="#888888">Rust Web后端生态</text>


    <!-- ================= 区域 3：技术融合与桥梁（底部） ================= -->
    <rect x="40" y="490" width="920" height="180" rx="15" fill="#ffffff" filter="url(#shadow)" stroke="#e0e7ee" stroke-width="1"/>
    <rect x="40" y="490" width="920" height="40" rx="15" fill="#34495e"/>
    <rect x="40" y="515" width="920" height="15" fill="#34495e"/>
    <text x="500" y="518" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">技术栈融合 · 协同生态</text>
    
    <!-- 协同关系 -->
    <!-- C++ <-> Python -->
    <rect x="70" y="550" width="240" height="50" rx="6" fill="#ebf5ff" stroke="#3776ab" stroke-width="1"/>
    <text x="190" y="570" font-size="14" font-weight="bold" fill="#2c3e50" text-anchor="middle">C++ ↔ Python</text>
    <text x="190" y="590" font-size="12" fill="#555555" text-anchor="middle">Pybind11 · Nanobind</text>
    
    <!-- C++ <-> Rust -->
    <rect x="340" y="550" width="240" height="50" rx="6" fill="#fff0ec" stroke="#ce422b" stroke-width="1"/>
    <text x="460" y="570" font-size="14" font-weight="bold" fill="#2c3e50" text-anchor="middle">C++ ↔ Rust</text>
    <text x="460" y="590" font-size="12" fill="#555555" text-anchor="middle">cxx · bindgen · FFI</text>
    
    <!-- Python <-> Rust -->
    <rect x="610" y="550" width="240" height="50" rx="6" fill="#edf7ea" stroke="#76b900" stroke-width="1"/>
    <text x="730" y="570" font-size="14" font-weight="bold" fill="#2c3e50" text-anchor="middle">Python ↔ Rust</text>
    <text x="730" y="590" font-size="12" fill="#555555" text-anchor="middle">PyO3 · Maturin</text>
    
    <!-- 全平台桥梁 -->
    <rect x="340" y="615" width="510" height="40" rx="6" fill="#eefafc" stroke="#24c8db" stroke-width="2"/>
    <text x="595" y="640" font-size="14" font-weight="bold" fill="#e67e22" text-anchor="middle">全平台应用桥梁：Tauri（前端Web技术 + 后端Rust） → 桌面 / 移动端</text>
    
    <!-- 忽略区域 -->
    <rect x="70" y="615" width="240" height="40" rx="6" fill="#f4f6f8" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4"/>
    <text x="190" y="635" font-size="14" font-weight="bold" fill="#95a5a6" text-anchor="middle">忽略：Java · C# · Dart · Qt</text>
    
    <!-- 连接线（示意性） -->
    <path d="M 320 260 L 600 260" stroke="#7f8c8d" stroke-width="2" stroke-dasharray="5" marker-end="url(#arrow)"/>
    <path d="M 600 320 L 650 320" stroke="#7f8c8d" stroke-width="2" stroke-dasharray="5" marker-end="url(#arrow)"/>
    <path d="M 500 500 L 500 540" stroke="#7f8c8d" stroke-width="2" stroke-dasharray="5"/>

</svg>