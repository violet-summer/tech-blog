name: Deploy GitHub Pages

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.4
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # GitHub Pages 项目站地址为 https://<owner>.github.io/<repo>/ ，须设置 base，否则 CSS/JS 会从域名根路径加载导致 404
      - name: Set site URL and base path for GitHub Pages
        run: |
          REPO="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          if [ "$REPO" = "${OWNER}.github.io" ]; then
            echo "SITE_URL=https://${OWNER}.github.io" >> "$GITHUB_ENV"
            echo "BASE_URL=/" >> "$GITHUB_ENV"
          else
            echo "SITE_URL=https://${OWNER}.github.io" >> "$GITHUB_ENV"
            echo "BASE_URL=/${REPO}/" >> "$GITHUB_ENV"
          fi

      - name: Build site
        run: pnpm run build

      - name: Add .nojekyll
        run: touch dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist
          # v4 默认不包含点文件；Jekyll 跳过依赖根目录的 .nojekyll
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
