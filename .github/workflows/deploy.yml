# 使用 gh-pages 分支发布（与 Settings → Pages → Deploy from a branch 一致，避免 deploy-pages 未生效时整站 404）
# 推送成功后请到：Settings → Pages → Build and deployment → Source 选「Deploy from a branch」
# Branch 选 gh-pages，Folder 选 / (root)，保存。
name: Deploy GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-branch-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.4
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: |
          pnpm run build
          test -f dist/index.html || { echo "missing dist/index.html"; exit 1; }
          ls -la dist | head -20

      - name: Ensure Jekyll is off (static + _astro)
        run: touch dist/.nojekyll

      - name: Push dist to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          clean: true
